name: Daily dashboard update

on:
  schedule:
    # GitHub cron runs in UTC. These two entries cover 06:00 in Spain
    # in summer time (04:17 UTC) and winter time (05:17 UTC).
    # Avoid minute 0 because GitHub can delay/drop scheduled jobs at peak time.
    - cron: '17 4 * * *'
    - cron: '17 5 * * *'
  workflow_dispatch:

concurrency:
  group: daily-dashboard-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install schedule parser dependencies
        run: python3 -m pip install pypdf

      - name: Fetch live schedule
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python3 src/live_schedule_fetcher.py || echo "Schedule fetch failed (no API key or endpoint error) — continuing with cached data"

      - name: Fetch live player profiles
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python3 src/live_profile_fetcher.py --top 200 --no-cache || echo "Player profile fetch failed (no API key or endpoint error) — continuing with derived data"

      - name: Fetch recent result overlay
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python3 src/live_results_fetcher.py --days-back 21 || echo "Result overlay fetch failed — continuing with Sackmann data"

      - name: Build dashboard
        run: python3 src/build_index.py --top 200 --no-cache
        # --no-cache refreshes current rankings and Sackmann match CSVs before
        # rebuilding the embedded HTML dashboard.

      - name: Audit data freshness
        run: python3 src/data_audit.py

      - name: Commit updated dashboard
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add examples/index.html data/_csv_cache/ data/live_schedule.json data/live_results_overlay.json data/player_live_profiles.json
          git diff --staged --quiet && echo "Nothing changed" && exit 0
          git commit -m "Dashboard update $(date -u +%Y-%m-%d)"
          git push
