name: Update live tennis schedule

on:
  schedule:
    # 06:15 in Spain during summer time, 07:15 during winter time.
    - cron: "15 4 * * *"
  workflow_dispatch:

jobs:
  update-live-schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch schedule cache
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python3 src/live_schedule_fetcher.py
      - name: Rebuild index
        run: python3 src/build_index.py --output examples/index.html
      - name: Commit daily schedule
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update live tennis schedule"
          file_pattern: data/live_schedule.json examples/index.html
